<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - UTS Saber Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #00843D 0%, rgb(12, 218, 73) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 550px;
            padding: 40px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header i {
            font-size: 50px;
            color: #00843D;
            margin-bottom: 15px;
        }
        
        .register-header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .register-header p {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        label i {
            color: #00843D;
            margin-right: 8px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00843D;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .row .form-group {
            flex: 1;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #00843D;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #006633;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .login-link a {
            color: #00843D;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <i class="fas fa-user-plus"></i>
            <h1>Registro de Estudiante</h1>
            <p>Completa tus datos para registrarte</p>
        </div>
        
        <div th:if="${param.error}" class="error-message">
            <i class="fas fa-exclamation-circle"></i> 
            <span th:if="${param.error == 'email'}">El correo ya está registrado</span>
            <span th:unless="${param.error == 'email'}">Error en el registro</span>
        </div>
        
        <div th:if="${param.exito}" class="success-message" style="background:#dcfce7; color:#00843D; padding:12px; border-radius:10px; margin-bottom:20px;">
            <i class="fas fa-check-circle"></i> Registro exitoso. Inicia sesión.
        </div>
        
        <form action="/registro" method="post" th:object="${estudianteDTO}">
            <div class="row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nombre</label>
                    <input type="text" th:field="*{nombre}" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Apellido</label>
                    <input type="text" th:field="*{apellido}" required placeholder="Tu apellido">
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Cédula</label>
                <input type="text" th:field="*{cedula}" required placeholder="Número de cédula">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" th:field="*{email}" required placeholder="correo@uts.edu.co">
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" th:field="*{password}" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirmar</label>
                    <input type="password" name="confirmPassword" required placeholder="••••••••">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Sede</label>
                    <select th:field="*{sedeId}" required>
                        <option value="">Seleccione una sede</option>
                        <option th:each="sede : ${sedes}" th:value="${sede.id}" th:text="${sede.nombre}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-graduation-cap"></i> Carrera</label>
                    <select th:field="*{carreraId}" required>
                        <option value="">Seleccione una carrera</option>
                        <option th:each="carrera : ${carreras}" th:value="${carrera.id}" th:text="${carrera.nombre}"></option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> Semestre</label>
                    <input type="number" th:field="*{semestre}" required placeholder="Ej: 1" min="1" max="10">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" th:field="*{telefono}" placeholder="300 123 4567">
                </div>
            </div>
            
            <button type="submit">Registrarse</button>
        </form>
        
        <div class="login-link">
            <a href="/login">¿Ya tienes cuenta? Inicia sesión aquí</a>
        </div>
    </div>
</body>
</html>
