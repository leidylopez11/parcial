<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 20px; background: #00843D; color: white; }
        .card-header h1 { font-size: 24px; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .btn-primary { background: #00843D; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn-primary:hover { background: #006633; }
        .btn-secondary { background: #6c757d; color: white; padding: 12px 24px; border: none; border-radius: 6px; text-decoration: none; display: inline-block; font-size: 16px; font-weight: 600; }
        .btn-secondary:hover { background: #5a6268; }
        .actions { margin-top: 30px; display: flex; gap: 15px; }
        .badge { background: #f8f9fa; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1><i class="fas fa-user-edit"></i> Editar Usuario</h1>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/usuario/actualizar/{id}(id=${usuario.id})}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre</label>
                            <input type="text" name="nombre" th:value="${usuario.nombre}" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Apellido</label>
                            <input type="text" name="apellido" th:value="${usuario.apellido}" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="text" name="telefono" th:value="${usuario.telefono}">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Sede</label>
                        <select name="sedeId">
                            <option value="">Seleccionar sede</option>
                            <option th:each="s : ${sedes}" th:value="${s.id}" th:text="${s.nombre}" th:selected="${usuario.sede != null and usuario.sede.id == s.id}"></option>
                        </select>
                    </div>
                    
                    <div th:if="${usuario.rol.name() == 'DOCENTE'}">
                        <div class="form-group">
                            <label><i class="fas fa-chalkboard-user"></i> Especialidad</label>
                            <input type="text" name="especialidad" th:value="${especialidad}" placeholder="Especialidad del docente">
                        </div>
                    </div>
                    
                    <div th:if="${usuario.rol.name() == 'COORDINACION'}">
                        <div class="form-group">
                            <label><i class="fas fa-building"></i> Facultad</label>
                            <select name="facultadId">
                                <option value="">Seleccionar facultad</option>
                                <option th:each="f : ${facultades}" th:value="${f.id}" th:text="${f.nombre}" th:selected="${facultadId != null and facultadId == f.id}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="actions">
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar cambios</button>
                        <a href="/admin/usuarios" class="btn-secondary"><i class="fas fa-arrow-left"></i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
