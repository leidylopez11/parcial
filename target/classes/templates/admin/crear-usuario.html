<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Crear Usuario UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .sidebar { width: 280px; background: #00843D; height: 100vh; position: fixed; left: 0; top: 0; color: white; overflow-y: auto; }
        .sidebar-header { padding: 30px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header i { font-size: 48px; margin-bottom: 15px; }
        .sidebar-header h2 { font-size: 18px; font-weight: 600; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: rgba(255,255,255,0.85); text-decoration: none; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #FFD700; }
        .nav-item i { width: 22px; font-size: 18px; }
        .main-content { margin-left: 280px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 25px; border-radius: 12px; }
        .page-title h1 { font-size: 24px; color: #333; font-weight: 700; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 25px; }
        .card-header { padding: 18px 25px; border-bottom: 1px solid #e0e0e0; background: #fafafa; }
        .card-header h2 { font-size: 18px; font-weight: 700; color: #333; }
        .card-header i { color: #00843D; margin-right: 10px; }
        .card-body { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #00843D; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-primary { background: #00843D; color: white; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-primary:hover { background: #006633; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="fas fa-university"></i><h2>Panel Administrador</h2><p>UTS Saber Pro</p></div>
        <div class="nav-menu">
            <a href="/admin/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/admin/usuarios" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
            <a href="/admin/crear-usuario" class="nav-item active"><i class="fas fa-user-plus"></i> Crear Usuario</a>
            <a href="/admin/carreras" class="nav-item"><i class="fas fa-graduation-cap"></i> Carreras</a>
            <a href="/admin/facultades" class="nav-item"><i class="fas fa-building"></i> Facultades</a>
            <a href="/admin/sedes" class="nav-item"><i class="fas fa-map-marker-alt"></i> Sedes</a>
            <a href="/admin/recibos" class="nav-item"><i class="fas fa-receipt"></i> Recibos</a>
            <a href="/admin/resoluciones" class="nav-item"><i class="fas fa-file-pdf"></i> Resoluciones</a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>Crear Usuario</h1><p>Registrar nuevos usuarios en el sistema</p></div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-user-plus"></i> Registrar nuevo usuario</h2></div>
            <div class="card-body">
                <form action="/admin/crear-usuario" method="post">
                    <div class="form-row">
                        <div class="form-group"><label>Rol</label><select name="rol" required><option value="DOCENTE">Docente</option><option value="COORDINACION">Coordinación</option></select></div>
                        <div class="form-group"><label>Sede</label><select name="sedeId"><option value="">Seleccionar sede</option><option th:each="s : ${sedes}" th:value="${s.id}" th:text="${s.nombre}"></option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required placeholder="Nombre completo"></div>
                        <div class="form-group"><label>Apellido</label><input type="text" name="apellido" required placeholder="Apellido completo"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Cédula</label><input type="text" name="cedula" required placeholder="Número de cédula"></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="correo@uts.edu.co"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Teléfono</label><input type="text" name="telefono" placeholder="Teléfono de contacto"></div>
                        <div class="form-group" id="especialidadGroup" style="display:none;"><label>Especialidad</label><input type="text" name="especialidad" placeholder="Especialidad del docente"></div>
                        <div class="form-group" id="facultadGroup" style="display:none;"><label>Facultad</label><select name="facultadId"><option value="">Seleccionar facultad</option><option th:each="f : ${facultades}" th:value="${f.id}" th:text="${f.nombre}"></option></select></div>
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Crear usuario</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('select[name="rol"]').addEventListener('change', function() {
            var especialidadDiv = document.getElementById('especialidadGroup');
            var facultadDiv = document.getElementById('facultadGroup');
            if (this.value === 'DOCENTE') { especialidadDiv.style.display = 'block'; facultadDiv.style.display = 'none'; }
            else if (this.value === 'COORDINACION') { especialidadDiv.style.display = 'none'; facultadDiv.style.display = 'block'; }
            else { especialidadDiv.style.display = 'none'; facultadDiv.style.display = 'none'; }
        });
    </script>
</body>
</html>
