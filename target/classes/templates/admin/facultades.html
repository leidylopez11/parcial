<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Facultades UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .sidebar { width: 280px; background: #00843D; height: 100vh; position: fixed; left: 0; top: 0; color: white; overflow-y: auto; }
        .sidebar-header { padding: 30px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header i { font-size: 48px; margin-bottom: 15px; }
        .sidebar-header h2 { font-size: 18px; font-weight: 600; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: rgba(255,255,255,0.85); text-decoration: none; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #FFD700; }
        .nav-item i { width: 22px; font-size: 18px; }
        .main-content { margin-left: 280px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 25px; border-radius: 12px; }
        .page-title h1 { font-size: 24px; color: #333; font-weight: 700; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 25px; }
        .card-header { padding: 18px 25px; border-bottom: 1px solid #e0e0e0; background: #fafafa; }
        .card-header h2 { font-size: 18px; font-weight: 700; color: #333; }
        .card-header i { color: #00843D; margin-right: 10px; }
        .card-body { padding: 25px; }
        .btn-edit { background: #00843D; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; display: inline-block; cursor: pointer; border: none; }
        .btn-delete { background: #dc2626; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; display: inline-block; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f8f9fa; color: #333; font-weight: 600; }
        .actions { display: flex; gap: 8px; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 5% auto; padding: 0; width: 500px; border-radius: 12px; overflow: hidden; }
        .modal-header { background: #00843D; color: white; padding: 15px 20px; display: flex; justify-content: space-between; }
        .modal-header .close { color: white; font-size: 28px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-body .form-group { margin-bottom: 15px; }
        .modal-body label { display: block; font-weight: 600; margin-bottom: 5px; }
        .modal-body input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .modal-footer { padding: 15px 20px; background: #f8f9fa; text-align: right; }
        .btn-save { background: #00843D; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: #6c757d; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="fas fa-university"></i><h2>Panel Administrador</h2><p>UTS Saber Pro</p></div>
        <div class="nav-menu">
            <a href="/admin/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/admin/usuarios" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
            <a href="/admin/crear-usuario" class="nav-item"><i class="fas fa-user-plus"></i> Crear Usuario</a>
            <a href="/admin/carreras" class="nav-item"><i class="fas fa-graduation-cap"></i> Carreras</a>
            <a href="/admin/facultades" class="nav-item active"><i class="fas fa-building"></i> Facultades</a>
            <a href="/admin/sedes" class="nav-item"><i class="fas fa-map-marker-alt"></i> Sedes</a>
            <a href="/admin/recibos" class="nav-item"><i class="fas fa-receipt"></i> Recibos</a>
            <a href="/admin/resoluciones" class="nav-item"><i class="fas fa-file-pdf"></i> Resoluciones</a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>Facultades</h1><p>Gestión de facultades académicas</p></div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-list"></i> Lista de facultades</h2></div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Nombre</th><th>Decano</th><th>Coordinador</th><th>Email</th><th>Acciones</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="f : ${facultadesList}">
                                <td th:text="${f.id}">1</td>
                                <td th:text="${f.nombre}">-</td>
                                <td th:text="${f.decano}">-</td>
                                <td th:text="${f.coordinadorNombre}">-</td>
                                <td th:text="${f.coordinadorEmail}">-</td>
                                <td class="actions">
                                    <button class="btn-edit" 
                                            th:data-id="${f.id}"
                                            th:data-nombre="${f.nombre}"
                                            th:data-decano="${f.decano != null ? f.decano : ''}"
                                            th:data-coordinador-nombre="${f.coordinadorNombre != null ? f.coordinadorNombre : ''}"
                                            th:data-coordinador-email="${f.coordinadorEmail != null ? f.coordinadorEmail : ''}"
                                            onclick="openEditModal(this)">
                                        <i class="fas fa-edit"></i> Editar
                                    </button>
                                    <a th:href="@{/admin/facultades/eliminar/{id}(id=${f.id})}" class="btn-delete" onclick="return confirm('¿Eliminar esta facultad?')"><i class="fas fa-trash"></i> Eliminar</a>
                                </td>
                             </tr>
                            <tr th:if="${facultadesList.empty}">
                                <td colspan="6" style="text-align: center;">No hay facultades registradas</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Editar Facultad</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="editForm" method="post">
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" id="editNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Decano</label>
                        <input type="text" name="decano" id="editDecano">
                    </div>
                    <div class="form-group">
                        <label>Coordinador</label>
                        <input type="text" name="coordinadorNombre" id="editCoordinadorNombre">
                    </div>
                    <div class="form-group">
                        <label>Email coordinador</label>
                        <input type="email" name="coordinadorEmail" id="editCoordinadorEmail">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEditModal(btn) {
            var id = btn.getAttribute('data-id');
            var nombre = btn.getAttribute('data-nombre');
            var decano = btn.getAttribute('data-decano');
            var coordinadorNombre = btn.getAttribute('data-coordinador-nombre');
            var coordinadorEmail = btn.getAttribute('data-coordinador-email');
            
            document.getElementById('editId').value = id;
            document.getElementById('editNombre').value = nombre;
            document.getElementById('editDecano').value = decano;
            document.getElementById('editCoordinadorNombre').value = coordinadorNombre;
            document.getElementById('editCoordinadorEmail').value = coordinadorEmail;
            document.getElementById('editForm').action = '/admin/facultades/actualizar/' + id;
            document.getElementById('editModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        window.onclick = function(event) {
            var modal = document.getElementById('editModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
