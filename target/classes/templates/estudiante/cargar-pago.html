<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estudiante - Cargar Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; }
        .sidebar { width: 280px; background: #00843D; height: 100vh; position: fixed; left: 0; top: 0; color: white; overflow-y: auto; }
        .sidebar-header { padding: 30px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header i { font-size: 48px; margin-bottom: 15px; }
        .sidebar-header h2 { font-size: 18px; font-weight: 600; }
        .sidebar-header p { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: rgba(255,255,255,0.85); text-decoration: none; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #FFD700; }
        .nav-item i { width: 22px; font-size: 18px; }
        .main-content { margin-left: 280px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { color: #00843D; text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .page-title h1 { font-size: 24px; color: #333; font-weight: 700; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
        .card { background: white; border-radius: 12px; max-width: 600px; margin: 0 auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 20px; background: #00843D; color: white; }
        .card-header h2 { font-size: 20px; font-weight: 600; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-submit { background: #00843D; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-submit:hover { background: #006633; }
        .info-text { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-graduate"></i>
            <h2>Panel Estudiante</h2>
            <p>UTS Saber Pro</p>
        </div>
        <div class="nav-menu">
            <a href="/estudiante/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/estudiante/cargar-pago" class="nav-item active"><i class="fas fa-receipt"></i> Cargar Pago</a>
            <a href="/estudiante/mis-resultados" class="nav-item"><i class="fas fa-chart-line"></i> Mis Resultados</a>
            <a href="/estudiante/mis-beneficios" class="nav-item"><i class="fas fa-gift"></i> Mis Beneficios</a>
            <a href="/estudiante/historial-pagos" class="nav-item"><i class="fas fa-history"></i> Historial de Pagos</a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <a href="/estudiante/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Volver al dashboard</a>
                <h1>Cargar Recibo de Pago</h1>
            </div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-upload"></i> Subir comprobante</h2>
            </div>
            <div class="card-body">
                <form action="/estudiante/cargar-pago" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label><i class="fas fa-file-pdf"></i> Seleccionar archivo</label>
                        <input type="file" name="archivo" accept=".pdf,.jpg,.png" required>
                        <p class="info-text">Formatos permitidos: PDF, JPG, PNG. Máximo 5MB.</p>
                    </div>
                    <button type="submit" class="btn-submit"><i class="fas fa-cloud-upload-alt"></i> Subir recibo</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
