<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Docente - Resoluciones UTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; }
        .sidebar { width: 280px; background: #00843D; height: 100vh; position: fixed; left: 0; top: 0; color: white; overflow-y: auto; }
        .sidebar-header { padding: 30px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header i { font-size: 48px; margin-bottom: 15px; }
        .sidebar-header h2 { font-size: 18px; font-weight: 600; }
        .sidebar-header p { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: rgba(255,255,255,0.85); text-decoration: none; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #FFD700; }
        .nav-item i { width: 22px; font-size: 18px; }
        .main-content { margin-left: 280px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { color: #00843D; text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .back-link:hover { text-decoration: underline; }
        .page-title h1 { font-size: 24px; color: #333; font-weight: 700; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; overflow: hidden; }
        .card-header { padding: 18px 25px; border-bottom: 1px solid #e0e0e0; background: #fafafa; }
        .card-header h2 { font-size: 18px; font-weight: 700; color: #333; }
        .card-header i { color: #00843D; margin-right: 10px; }
        .card-body { padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f8f9fa; color: #333; font-weight: 600; }
        .btn-small { padding: 4px 8px; font-size: 11px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-view { background: #2563eb; color: white; }
        .badge-active { background: #d1fae5; color: #00843D; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-chalkboard-user"></i>
            <h2>Panel Docente</h2>
            <p>UTS Saber Pro</p>
        </div>
        <div class="nav-menu">
            <a href="/docente/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/docente/estudiantes" class="nav-item"><i class="fas fa-users"></i> Estudiantes</a>
            <a href="/docente/informe-general" class="nav-item"><i class="fas fa-file-alt"></i> Informe general</a>
            <a href="/docente/resoluciones" class="nav-item active"><i class="fas fa-file-pdf"></i> Resoluciones</a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <a href="/docente/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Volver al dashboard</a>
                <h1>Resoluciones UTS</h1>
            </div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-file-pdf"></i> Documentos oficiales</h2></div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fecha publicación</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${resoluciones}">
                                <td th:text="${r.id}">1</td>
                                <td th:text="${r.nombre}">-</td>
                                <td th:text="${r.fechaPublicacion}">-</td>
                                <td><span class="badge-active" th:if="${r.activo}">Activo</span><span th:unless="${r.activo}" style="color:#999;">Inactivo</span></td>
                                <td><a th:href="${r.archivoUrl}" target="_blank" class="btn-small btn-view"><i class="fas fa-eye"></i> Ver PDF</a></td>
                            </tr>
                            <tr th:if="${resoluciones == null or resoluciones.isEmpty()}">
                                <td colspan="5" style="text-align: center;">No hay resoluciones disponibles</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
