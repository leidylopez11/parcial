<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Coordinación - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; }
        .sidebar { width: 280px; background: #00843D; height: 100vh; position: fixed; left: 0; top: 0; color: white; }
        .sidebar-header { padding: 30px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-header i { font-size: 48px; }
        .sidebar-header h2 { font-size: 18px; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: rgba(255,255,255,0.85); text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #FFD700; }
        .main-content { margin-left: 280px; padding: 25px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 15px 25px; border-radius: 12px; }
        .page-title h1 { font-size: 24px; color: #333; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border-top: 4px solid #00843D; }
        .stat-card i { font-size: 32px; color: #00843D; margin-bottom: 15px; }
        .stat-card h3 { font-size: 28px; font-weight: 700; color: #333; }
        .stat-card p { color: #666; }
        .card { background: white; border-radius: 12px; margin-bottom: 25px; }
        .card-header { padding: 18px 25px; border-bottom: 1px solid #e0e0e0; background: #fafafa; }
        .card-header h2 { font-size: 18px; color: #333; }
        .card-header i { color: #00843D; margin-right: 10px; }
        .card-body { padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f8f9fa; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .badge-success { background: #d1fae5; color: #00843D; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .btn-small { padding: 4px 8px; font-size: 11px; border-radius: 4px; text-decoration: none; background: #2563eb; color: white; display: inline-block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><i class="fas fa-clipboard-list"></i><h2>Coordinación UTS</h2><p>UTS Saber Pro</p></div>
        <div class="nav-menu">
            <a href="/coordinacion/dashboard" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/coordinacion/estudiantes" class="nav-item"><i class="fas fa-users"></i> Estudiantes</a>
			<a href="/coordinacion/recibos" class="nav-item"><i class="fas fa-receipt"></i> Recibos de Pago</a>
            <a href="/coordinacion/resultados" class="nav-item"><i class="fas fa-chart-line"></i> Resultados</a>
            <a href="/coordinacion/beneficios" class="nav-item"><i class="fas fa-gift"></i> Beneficios</a>
            <a href="/coordinacion/informe-general" class="nav-item"><i class="fas fa-file-alt"></i> Informe general</a>
			<a href="/coordinacion/resoluciones" class="nav-item"><i class="fas fa-file-pdf"></i> Resoluciones</a>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>Dashboard</h1></div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3 th:text="${totalEstudiantes}">0</h3><p>Total estudiantes</p></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3 th:text="${cumplen}">0</h3><p>Cumplen graduación</p></div>
            <div class="stat-card"><i class="fas fa-gift"></i><h3 th:text="${conBeneficio}">0</h3><p>Con beneficios</p></div>
        </div>
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-clock"></i> Últimos estudiantes registrados</h2></div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Nombre</th><th>Cédula</th><th>Carrera</th><th>Pago</th><th>Acción</th></tr></thead>
                        <tbody>
                            <tr th:each="e : ${ultimosEstudiantes}">
                                <td th:text="${e.usuario.nombre} + ' ' + ${e.usuario.apellido}">-</td>
                                <td th:text="${e.usuario.cedula}">-</td>
                                <td th:text="${e.carrera != null ? e.carrera.nombre : '-'}">-</td>
                                <td><span class="badge badge-success" th:if="${e.pagoAprobado}">Aprobado</span><span class="badge badge-warning" th:unless="${e.pagoAprobado}">Pendiente</span></td>
                                <td><a th:href="@{/coordinacion/estudiante/ver/{id}(id=${e.id})}" class="btn-small"><i class="fas fa-eye"></i> Ver</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
